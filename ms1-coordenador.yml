server:
  port: 8081

spring:
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5434/boletim}
    username: ${POSTGRES_USER:boletim}
    password: ${POSTGRES_PASSWORD:boletim}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

resilience4j:
  circuitbreaker:
    instances:
      ms3-validacao:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
      ms2-pergunta:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 15s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
  retry:
    instances:
      ms3-validacao:
        max-attempts: 3
        wait-duration: 200ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
      ms2-pergunta:
        max-attempts: 2
        wait-duration: 300ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
  ratelimiter:
    instances:
      notas-lancamento:
        limit-for-period: 50
        limit-refresh-period: 1s
        timeout-duration: 0s
      pergunta:
        limit-for-period: 3
        limit-refresh-period: 1s
        timeout-duration: 0s
  bulkhead:
    instances:
      ms2-pergunta:
        max-concurrent-calls: 5
        max-wait-duration: 0s

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,circuitbreakerevents,ratelimiters,ratelimiterevents,prometheus
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true
    ratelimiters:
      enabled: true