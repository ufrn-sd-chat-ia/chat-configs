# Lista os 2 nós do cluster Eureka (Fase 7) -- os clientes (gateway, ms1,
# ms2, ms3, mcp-server-academico) tentam ambos e continuam funcionando se
# um dos nós cair.
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/,http://localhost:8762/eureka/

# Regras de avaliação: fonte única, compartilhada entre o ms3-serverless
# (calcula a situação da nota) e o mcp-server-academico (tool de consulta às
# regras) -- os dois leem daqui, sem duplicar o valor em dois arquivos.
boletim:
  avaliacao:
    frequencia-minima: 75.0
    media-aprovacao: 7.0
    media-recuperacao: 5.0

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans