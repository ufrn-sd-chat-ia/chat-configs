server:
  port: 8082

spring:
  graphql:
    graphiql:
      enabled: true
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:default_api_key} 
      chat:
        options:
          model: "gpt-3.5-turbo"
          temperature: 0.7

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus